# modify from: https://github.com/isaacs/github/issues/415#issuecomment-561700485
name: Mirror AlphaImpute2 Repo
on:
  schedule:
    # nightly (0th hour 0th minute of every day)
    - cron:  '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Mirror
      run: |
        git clone --bare 'https://github.com/AlphaGenes/AlphaImpute2.git'
        cd AlphaImpute2.git/
        git remote add github "https://$GITHUB_ACTOR:$GITHUB_TOKEN@github.com/HighlanderLab/AlphaImpute2.git"
        git push --mirror --force github
      env:
        GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
