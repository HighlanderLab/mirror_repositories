# modify from: https://github.com/isaacs/github/issues/415#issuecomment-561700485
name: Mirror AlphaPeel-Fortran Repo
on:
  schedule:
    # Runs at 05:00, on day 11 of the month
    - cron:  '0 5 11 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Mirror
      run: |
        git clone --bare 'https://github.com/AlphaGenes/AlphaPeel-Fortran.git'
        cd AlphaPeel-Fortran.git/
        git remote add github "https://$GITHUB_ACTOR:$GITHUB_TOKEN@github.com/HighlanderLab/AlphaPeel-Fortran.git"
        git push --mirror --force github
      env:
        GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
